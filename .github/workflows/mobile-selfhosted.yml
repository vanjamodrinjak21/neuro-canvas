name: Mobile Verify (self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mobile-selfhosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (debug unsigned) advisory
    runs-on: [self-hosted, macOS, ARM64]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Ensure toolchain
        run: |
          if ! command -v node >/dev/null 2>&1 || [ "$(node -v | cut -c2- | cut -d. -f1)" -lt 22 ]; then
            brew install node@22 && brew link --overwrite --force node@22
          fi
          if /usr/libexec/java_home -v 21 >/dev/null 2>&1; then
            JAVA_HOME="$(/usr/libexec/java_home -v 21)"
          elif [ -d /opt/homebrew/opt/openjdk@21 ]; then
            JAVA_HOME="/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home"
          else
            brew install openjdk@21
            JAVA_HOME="/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home"
          fi
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"

          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            curl -fsSL -o /tmp/cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-mac-13114758_latest.zip
            unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          fi
          SDKM="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKM" --licenses >/dev/null 2>&1 || true
          "$SDKM" \
            "platform-tools" \
            "platforms;android-36" "platforms;android-35" "platforms;android-34" \
            "build-tools;36.0.0" "build-tools;35.0.0" "build-tools;34.0.0" \
            "ndk;27.2.12479018" >/dev/null 2>&1 || true
          yes | "$SDKM" --licenses >/dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"

      - name: Install dependencies and sync
        env:
          NUXT_PUBLIC_COLLAB_ENABLED: 'false'
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          npm ci --legacy-peer-deps
          npx prisma generate
          npm run generate
          npx cap sync android

      - name: Assemble debug
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

  ios:
    name: iOS (build no sign) advisory
    runs-on: [self-hosted, macOS, ARM64]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Ensure toolchain
        run: |
          if ! command -v node >/dev/null 2>&1 || [ "$(node -v | cut -c2- | cut -d. -f1)" -lt 22 ]; then
            brew install node@22 && brew link --overwrite --force node@22
          fi
          xcode-select -p

      - name: Install dependencies and sync
        env:
          NUXT_PUBLIC_COLLAB_ENABLED: 'false'
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          npm ci --legacy-peer-deps
          npx prisma generate
          npm run generate
          npx cap sync ios

      - name: Build for generic iOS device (no signing)
        working-directory: ios/App
        run: |
          if ! xcodebuild -showsdks 2>/dev/null | grep -q '^iOS '; then
            echo "::warning::iOS SDK not installed in this Xcode. Open Xcode → Settings → Platforms → Get iOS, then re-run."
            exit 0
          fi
          xcodebuild -project App.xcodeproj -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build
