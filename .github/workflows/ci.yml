name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    # Non-blocking: Nuxt 4 + Prisma 7 migration has pre-existing type issues
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare Nuxt
        run: npx nuxi prepare

      - name: Typecheck (advisory, non-blocking)
        run: npm run typecheck || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npx nuxi build
        env:
          NITRO_PRESET: node-server
          NODE_OPTIONS: '--max-old-space-size=6144'

  tauri:
    name: Desktop (${{ matrix.label }}) — advisory
    needs: [lint, test]
    # Advisory: surfaces native build regressions without blocking merges.
    # On push to main, built bundles are uploaded to the rolling `nightly`
    # GitHub Release. Signing & notarization happen in release.yml on tag push.
    continue-on-error: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-14
            target: aarch64-apple-darwin
          - label: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install Linux WebKit deps (no-op on macOS/Windows)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci --legacy-peer-deps

      - run: npx prisma generate

      - name: Build Tauri + upload to "nightly" release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=6144'
          NUXT_PUBLIC_COLLAB_ENABLED: 'false'
        with:
          args: --target ${{ matrix.target }}
          tagName: nightly
          releaseName: 'NeuroCanvas Nightly'
          releaseBody: |
            Rolling pre-release. Built automatically from the latest `main` commit.
            Unsigned — desktop OSes will warn on first launch. For signed builds, use a tagged release.
          releaseDraft: false
          prerelease: true
