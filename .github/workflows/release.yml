name: Release

# Push a tag of the form v1.2.3 (or v1.2.3-rc.1) to publish a release.
# CI verifies tests/lint, then a fan-out matrix builds:
#   - Tauri desktop binaries (macOS arm/x86, Windows x86_64, Linux x86_64)
#   - Android APK + AAB (signed if keystore secrets present, unsigned otherwise)
#   - iOS .ipa (signed if Apple secrets present, archive only otherwise)
# Every artifact is uploaded to a single GitHub Release.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)build, e.g. v1.2.3'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # 1. Sanity gate — never ship a tag whose tests are red.
  verify:
    name: Verify (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run test

  # 2. Resolve the version once so every job ships the same number even if
  # workflow_dispatch was used.
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
      prerelease: ${{ steps.r.outputs.prerelease }}
    env:
      INPUT_TAG: ${{ inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - id: r
        shell: bash
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          VERSION="${TAG#v}"
          PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then PRERELEASE=true; fi
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  # 3. Tauri desktop matrix.
  build-tauri:
    name: Desktop (${{ matrix.label }})
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-14
            target: aarch64-apple-darwin
          - label: macOS (Intel)
            os: macos-13
            target: x86_64-apple-darwin
          - label: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: Windows (x86, 32-bit)
            os: windows-latest
            target: i686-pc-windows-msvc
          - label: Windows (ARM64)
            os: windows-latest
            target: aarch64-pc-windows-msvc
          - label: Linux (x86_64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: '0'
      RUST_BACKTRACE: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry/git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache Tauri target dir
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('src-tauri/Cargo.lock') }}-${{ hashFiles('src-tauri/src/**', 'src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('src-tauri/Cargo.lock') }}-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - run: npm ci --legacy-peer-deps

      - run: npx prisma generate

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.resolve-version.outputs.tag }}
          releaseName: 'NeuroCanvas ${{ needs.resolve-version.outputs.version }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            **Verify your download:** every artifact ships a matching `.sig` file produced by the Tauri updater key.
          releaseDraft: true
          prerelease: ${{ needs.resolve-version.outputs.prerelease == 'true' }}
          args: --target ${{ matrix.target }}

  # 4. Android — assemble release APK + AAB. Signs if keystore secrets are
  # present; otherwise produces an unsigned build for manual signing.
  build-android:
    name: Android (APK + AAB)
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
      TAG: ${{ needs.resolve-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: npm ci --legacy-peer-deps

      - name: Build web bundle for Capacitor
        run: |
          npx prisma generate
          npm run generate
        env:
          NUXT_PUBLIC_COLLAB_ENABLED: ${{ vars.NUXT_PUBLIC_COLLAB_ENABLED || 'true' }}
          NUXT_PUBLIC_PARTYKIT_HOST: ${{ vars.NUXT_PUBLIC_PARTYKIT_HOST }}
          AUTH_ORIGIN: ${{ vars.AUTH_ORIGIN || 'https://neuro-canvas.com' }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore (if provided)
        id: keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "keystore-path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK + AAB
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore-path }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [[ -n "${KEYSTORE_PATH}" ]]; then
            ./gradlew \
              -PversionName="${VERSION}" \
              -Pandroid.injected.signing.store.file="${KEYSTORE_PATH}" \
              -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
              -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
              -Pandroid.injected.signing.key.password="${KEY_PASSWORD}" \
              :app:assembleRelease :app:bundleRelease
          else
            ./gradlew -PversionName="${VERSION}" :app:assembleRelease :app:bundleRelease
          fi

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          for f in android/app/build/outputs/apk/release/*.apk; do
            cp "$f" "artifacts/NeuroCanvas-${VERSION}-android.apk"
          done
          for f in android/app/build/outputs/bundle/release/*.aab; do
            cp "$f" "artifacts/NeuroCanvas-${VERSION}-android.aab"
          done
          ls -la artifacts/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" artifacts/* --clobber

  # 5. iOS — archive + (optionally) export a signed .ipa. Always uploads the
  # archive zip; uploads the .ipa only when signing secrets are configured.
  build-ios:
    name: iOS (.ipa)
    needs: resolve-version
    runs-on: macos-14
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
      TAG: ${{ needs.resolve-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/App/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - run: npm ci --legacy-peer-deps

      - name: Build web bundle for Capacitor
        run: |
          npx prisma generate
          npm run generate
        env:
          NUXT_PUBLIC_COLLAB_ENABLED: ${{ vars.NUXT_PUBLIC_COLLAB_ENABLED || 'true' }}
          NUXT_PUBLIC_PARTYKIT_HOST: ${{ vars.NUXT_PUBLIC_PARTYKIT_HOST }}
          AUTH_ORIGIN: ${{ vars.AUTH_ORIGIN || 'https://neuro-canvas.com' }}

      - name: Sync Capacitor + install Pods
        run: |
          npx cap sync ios
          (cd ios/App && pod install --repo-update)

      - name: Set marketing version
        working-directory: ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER"   App/Info.plist

      - name: Import signing assets (if provided)
        id: sign
        if: env.IOS_P12_BASE64 != ''
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$IOS_P12_BASE64"               | base64 -d > "$RUNNER_TEMP/cert.p12"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$RUNNER_TEMP/cert.p12" -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Archive
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=${{ steps.sign.outputs.signed == 'true' && 'YES' || 'NO' }} \
            archive

      - name: Export .ipa (signed builds only)
        if: steps.sign.outputs.signed == 'true'
        env:
          EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'app-store' }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>${EXPORT_METHOD}</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          (cd "$RUNNER_TEMP" && tar -czf "$GITHUB_WORKSPACE/artifacts/NeuroCanvas-${VERSION}-ios.xcarchive.tar.gz" App.xcarchive)
          for f in "$RUNNER_TEMP"/export/*.ipa; do
            cp "$f" "artifacts/NeuroCanvas-${VERSION}-ios.ipa"
          done
          ls -la artifacts/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" artifacts/* --clobber

  # 6. Once every artifact is in the draft release, flip it to published
  # so the /download page can pick it up.
  publish:
    name: Publish release
    needs: [resolve-version, build-tauri, build-android, build-ios]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve-version.outputs.tag }}
      PRERELEASE: ${{ needs.resolve-version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark release published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$TAG" \
            --draft=false \
            --prerelease="$PRERELEASE"
