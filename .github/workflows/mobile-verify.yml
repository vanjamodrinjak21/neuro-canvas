name: Mobile Verify

# Cheap unsigned native builds on every PR / push to main, so a broken
# Capacitor sync or Gradle config never reaches a release tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: mobile-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (debug, unsigned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - run: npm ci --legacy-peer-deps

      - run: npx prisma generate
      - run: npm run generate
        env:
          NUXT_PUBLIC_COLLAB_ENABLED: 'false'
          NODE_OPTIONS: '--max-old-space-size=6144'

      - run: npx cap sync android

      - name: Assemble debug
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

  ios:
    name: iOS (build, no sign)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ios/App/CapApp-SPM/.build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/App/CapApp-SPM/Package.swift', 'ios/App/CapApp-SPM/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - run: npm ci --legacy-peer-deps

      - run: npx prisma generate
      - run: npm run generate
        env:
          NUXT_PUBLIC_COLLAB_ENABLED: 'false'
          NODE_OPTIONS: '--max-old-space-size=6144'

      - name: Sync Capacitor (SPM)
        run: npx cap sync ios

      - name: Build for simulator (no signing)
        working-directory: ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
